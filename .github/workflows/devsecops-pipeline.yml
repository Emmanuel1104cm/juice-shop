name: Pipeline DevSecOps Complet

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. ANALYSES PRÉ-BUILD (SAST, SCA, SECRETS, IAC)
  static_security_scans:
    name: Contrôles Statiques (Pre-Build)
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Détection des secrets (Gitleaks)
      - name: Détection de Secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          config: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Analyse statique & Dépendances (Trivy SCA / FS)
      - name: Audit Code & Dépendances (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          format: 'table'
          exit-code: '0' 

      # Analyse de l'Infrastructure as Code (Checkov)
      - name: Audit Configurations IaC (Checkov)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: '.'
          framework: 'terraform'
          soft_fail: true

  # 2. BUILD & SCAN & PUSH
  build_and_scan:
    name: Build et Scan Image
    needs: static_security_scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker
        run: docker build -t mon-application:latest .
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mon-application:latest'
          exit-code: '0'
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push Docker
        run: |
          docker tag mon-application:latest ${{ secrets.DOCKERHUB_USERNAME }}/juice-shop:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/juice-shop:latest