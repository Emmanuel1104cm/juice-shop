# Regroupement du Build et du Scan Image dans un seul job
  build_and_container_scan:
    name: Build & Scan Container
    needs: static_security_scans
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Build local de l'image
      - name: Build de l'image Docker locale
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mon-application:latest # On utilise un tag fixe 'latest'

      # 2. Analyse de l'image conteneurisée (Trivy)
      - name: Scan Image Docker (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mon-application:latest' # On scanne l'image locale
          severity: 'CRITICAL'
          exit-code: '0' 

      # 3. Phase de Release (Push)
      - name: Connexion au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pousser l'image validée
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/juice-shop:latest