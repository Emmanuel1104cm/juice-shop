name: Pipeline DevSecOps Complet

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  static_security_scans:
    name: Analyse Statique
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy FS
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '0'
      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: '.'
          framework: 'terraform'
          soft_fail: true

  build_and_scan:
    name: Build et Scan Image
    needs: static_security_scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker
        run: docker build -t mon-application:latest .
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mon-application:latest'
          exit-code: '0'
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push Docker
        run: |
          docker tag mon-application:latest ${{ secrets.DOCKERHUB_USERNAME }}/juice-shop:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/juice-shop:latest